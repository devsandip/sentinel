AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HTTPS front for the Sentinel EB demo. A CloudFront distribution terminates TLS
  with an ACM cert for a custom domain and forwards to the single-instance EB
  environment over HTTP. WebSockets are supported (caching disabled, all viewer
  headers forwarded). A Route 53 alias points the custom domain at CloudFront.

Parameters:
  CertificateArn:
    Type: String
    Description: ISSUED ACM cert (us-east-1) covering DomainName.
  OriginDomainName:
    Type: String
    Description: The EB environment CNAME (HTTP origin).
  DomainName:
    Type: String
    Description: The custom hostname to serve, e.g. sentinel.sandip.dev.
  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone id for the parent domain.

Resources:
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Sentinel HTTPS front for ${DomainName}"
        Aliases: [!Ref DomainName]
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: eb-origin
            DomainName: !Ref OriginDomainName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        CacheBehaviors:
          # Streamlit's front-end bundle: 61 files, 2.5MB, served from the
          # instance uncompressed and uncached because the default behavior below
          # is CachingDisabled with Compress:false. That is the six seconds of
          # blank white a cold visitor sees; TTFB is under a second, so it was
          # never an EB cold start. Measured 2026-07-20 against prod: the main
          # chunk alone is 908KB and gzips 3.4x (262KB), brotli 3.7x (243KB).
          #
          # These files are content-hashed and immutable, and Streamlit already
          # serves them with `cache-control: public, immutable, max-age=31536000`
          # which CachingDisabled was throwing away. So they get their own
          # behavior: compress at the edge, cache at the edge, and stop asking a
          # t3.small to re-serve 2.5MB to every visitor.
          #
          # Compression needs both halves. Compress:true alone does nothing under
          # the CachingDisabled policy, because CloudFront compresses what it
          # caches and that policy also drops Accept-Encoding from the cache key.
          # CachingOptimized (658327ea) enables gzip and brotli in the cache key
          # and honours the origin's cache-control.
          - PathPattern: /static/*
            TargetOriginId: eb-origin
            ViewerProtocolPolicy: redirect-to-https
            Compress: true
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            # Managed CachingOptimized. No origin request policy: these assets
            # vary on nothing, and forwarding cookies or query strings would
            # fragment the cache for no gain.
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        DefaultCacheBehavior:
          TargetOriginId: eb-origin
          ViewerProtocolPolicy: redirect-to-https
          # Stays false. The default behavior carries the WebSocket
          # (/_stcore/stream) and the dynamic HTML, and compressing a long-lived
          # upgraded connection is not something to switch on casually. The
          # payload that mattered is /static/*, handled above.
          Compress: false
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          # Managed policies: CachingDisabled + AllViewer. Streamlit is fully
          # dynamic and needs every header (incl. the WebSocket upgrade) passed
          # straight through.
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  DnsRecordA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        # Z2FDTNDATAQYW2 is CloudFront's fixed alias hosted-zone id.
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
        EvaluateTargetHealth: false

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
        EvaluateTargetHealth: false

Outputs:
  HttpsUrl:
    Value: !Sub "https://${DomainName}"
  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
