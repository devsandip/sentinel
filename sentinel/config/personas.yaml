# Identity personas and their capabilities (ideas.md item 9).
# No real auth: the UI picks a persona to demonstrate role-aware governance.
# Least privilege and segregation of duties are the point. Run authority and
# promotion authority are held by disjoint personas: the first line (Analyst)
# and the Admin can run but not approve; only the MRM Approver can promote, and
# it cannot run. The second line (Model Validator, MRM Approver) never runs, so
# an approver can never be the author of the run it signs off (CTL-SOD-01). The
# Auditor is read-only; only the Admin may toggle controls in demo mode.
#
# can_view_all_runs governs the Audit Log's own scope. Oversight roles read the
# whole ledger because reading other people's work is the job: the third line
# (Auditor) audits it, the second line (Validator, MRM Approver) reviews and
# signs it, and the Platform Admin operates the platform. The first line reads
# its own runs only. That is least privilege applied to the evidence itself: a
# first-line analyst has no business reading a colleague's run, and an audit
# surface that ignores its own access rules argues against the product.
#
# tier_role + attestations feed autonomy tier resolution (governed-codegen 4.6):
# tier = min(ceiling(data classification), ceiling(role, attestations)). Only a
# data_scientist rises above L0, and only by earning attestations. The Analyst is
# certified (L2); the Junior Analyst is the same role uncertified (L1), so the
# same person on the same data lands at a lower autonomy. The Admin additionally
# holds a sandbox_waiver, the one persona that can reach L3 on public data.

policy_version: "2026.07-rbac-v1"

personas:
  - id: analyst
    name: "Data Scientist / Analyst"
    role: "First line"
    can_run: true
    can_approve: false
    can_toggle_controls: false
    read_only: false
    can_view_all_runs: false
    tier_role: data_scientist
    attestations: [certified_analyst]
    description: >
      Builds and runs analyses. Cannot promote a model: promotion authority sits
      with the MRM Approver (segregation of duties). Certified, so on restricted
      data resolves to L2: may write code against the fenced API.

  - id: junior_analyst
    name: "Junior Analyst (uncertified)"
    role: "First line"
    can_run: true
    can_approve: false
    can_toggle_controls: false
    read_only: false
    can_view_all_runs: false
    tier_role: data_scientist
    attestations: []
    description: >
      Same first-line role as the Analyst, but not yet a certified analyst. Same
      person, same data, lower autonomy: resolves to L1, where the model picks a
      certified analysis and fills typed params rather than writing code.

  - id: model_validator
    name: "Model Validator"
    role: "Second line (MRM)"
    can_run: false
    can_approve: false
    can_toggle_controls: false
    read_only: false
    can_view_all_runs: true
    tier_role: model_validator
    attestations: []
    description: >
      Independently reviews fairness and eval results and flags issues. Second
      line does not run first-line analyses (segregation of duties), and does not
      hold the promotion sign-off, which is the MRM Approver's.

  - id: mrm_approver
    name: "MRM Approver"
    role: "Second line (MRM), approval authority"
    can_run: false
    can_approve: true
    can_toggle_controls: false
    read_only: false
    can_view_all_runs: true
    tier_role: model_validator
    attestations: []
    description: >
      Holds promotion authority at the human gate. Approves or rejects a proposed
      model, and cannot run analyses itself: the approver is never the author
      (segregation of duties). This is the four-eyes control.

  - id: auditor
    name: "Internal Auditor"
    role: "Third line"
    can_run: false
    can_approve: false
    can_toggle_controls: false
    read_only: true
    can_view_all_runs: true
    tier_role: compliance_officer
    attestations: []
    description: >
      Read-only access to the audit trail, model card, and evidence. Cannot run
      analyses or approve anything.

  - id: admin
    name: "Platform Admin"
    role: "Platform"
    can_run: true
    can_approve: false
    can_toggle_controls: true
    read_only: false
    can_view_all_runs: true
    tier_role: data_scientist
    attestations: [certified_analyst, sandbox_waiver]
    description: >
      Platform administrator. Can run and is the only role that may toggle a
      control off in demo mode (every toggle is itself audited). Holds a sandbox
      waiver, so on public data resolves to L3. Cannot promote: an admin who
      approves their own run is a standing audit finding, so promotion authority
      sits only with the MRM Approver.
