# Full override of the Elastic Beanstalk default nginx configuration.
#
# Streamlit holds a persistent WebSocket to the browser. EB's stock proxy does
# not forward the Upgrade/Connection headers, which makes the app load but hang
# forever ("Please wait..."). This config adds the WebSocket upgrade map and the
# per-request upgrade headers, and proxies to Streamlit on 127.0.0.1:8501.
#
# `include conf.d/elasticbeanstalk/*.conf;` in the server block pulls in EB's
# enhanced-health and monitoring config; it does not define its own `location /`,
# so there is no conflict with the one below.

user                    nginx;
error_log               /var/log/nginx/error.log warn;
pid                     /var/run/nginx.pid;
worker_processes        auto;
worker_rlimit_nofile    32153;

events {
    worker_connections  1024;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    log_format  main    '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

    include             conf.d/*.conf;

    map $http_upgrade $connection_upgrade {
        default         "upgrade";
        ""              "";
    }

    server {
        listen          80 default_server;

        client_header_timeout   60;
        client_body_timeout     60;
        keepalive_timeout       65;
        client_max_body_size    64m;

        gzip                    on;
        gzip_comp_level         4;
        gzip_types              text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        # Elastic Beanstalk enhanced health, monitoring, and static mappings.
        include                 conf.d/elasticbeanstalk/*.conf;

        location / {
            proxy_pass                  http://127.0.0.1:8501;
            proxy_http_version          1.1;

            # WebSocket upgrade — the whole reason this override exists.
            proxy_set_header    Upgrade             $http_upgrade;
            proxy_set_header    Connection          $connection_upgrade;

            proxy_set_header    Host                $host;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto   $scheme;

            # Streamlit's WS is long-lived; do not let the proxy time it out.
            proxy_read_timeout  3600;
            proxy_send_timeout  3600;
        }
    }
}
